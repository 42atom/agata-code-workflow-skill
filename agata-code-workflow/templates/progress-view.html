<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__AGATA_PROJECT_NAME__ | Agata Progress</title>
    <style>
      :root {
        /* Colors - Linear Light Vibes */
        --bg-main: #ffffff;
        --bg-side: #f7f7f8;
        --bg-hover: #f1f1f3;
        --border-quiet: #e1e1e3;
        --border-strong: #d1d1d4;

        --text-main: #121212;
        --text-muted: #6a6a6e;
        --text-quiet: #9b9ba1;

        --accent: #006adc;
        --accent-soft: #e5f1ff;

        /* Status Colors */
        --color-todo: #9b9ba1;
        --color-active: #006adc;
        --color-review: #7c3aed;
        --color-blocked: #f97316;
        --color-pass: #059669;
        --color-done: #10b981;
        --color-cancelled: #6b7280;

        /* Layout - Vertical High Density */
        --nav-height: 48px;
        --toolbar-height: 40px;
        --metrics-height: 28px;
        --radius-sm: 4px;

        /* Typography */
        --font-sans: "Inter", "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
        --font-mono: "SF Mono", "IBMPlexMono", Menlo, monospace;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--bg-main);
        color: var(--text-main);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-size: 13px;
      }

      /* Navbar (Title + Main Menu) */
      .navbar {
        height: var(--nav-height);
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid var(--border-quiet);
        background: var(--bg-main);
        gap: 32px;
        z-index: 100;
        flex-shrink: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .project-name {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .main-menu {
        display: flex;
        gap: 8px;
      }

      .menu-item {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        transition: color 0.1s, background 0.1s;
      }

      .menu-item:hover { color: var(--text-main); background: var(--bg-hover); }
      .menu-item.active { color: var(--accent); background: var(--accent-soft); }

      /* Toolbar (Tabs + Search) */
      .toolbar {
        height: var(--toolbar-height);
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid var(--border-quiet);
        background: var(--bg-side);
        gap: 12px;
        flex-shrink: 0;
      }

      .sub-tabs {
        display: flex;
        gap: 2px;
        background: #e1e1e3;
        padding: 2px;
        border-radius: var(--radius-sm);
      }

      .sub-tab {
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        border-radius: 3px;
        cursor: pointer;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .sub-tab:hover { color: var(--text-main); }
      .sub-tab.active { background: var(--bg-main); color: var(--text-main); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

      .tab-badge {
        font-size: 10px;
        font-weight: 400;
        color: var(--text-quiet);
        background: rgba(0,0,0,0.05);
        padding: 0 4px;
        border-radius: 2px;
        line-height: normal;
      }

      .sub-tab.active .tab-badge {
        background: var(--bg-hover);
        color: var(--text-muted);
      }

      .search-container {
        position: relative;
        width: 240px;
        margin-left: auto;
      }

      .search-input {
        width: 100%;
        padding: 4px 8px 4px 26px;
        background: var(--bg-main);
        border: 1px solid var(--border-quiet);
        border-radius: var(--radius-sm);
        font-size: 12px;
        outline: none;
      }

      .search-icon {
        position: absolute;
        left: 8px; top: 50%; transform: translateY(-50%);
        width: 12px; height: 12px; color: var(--text-quiet);
      }

      /* Metrics Bar */
      .metrics-bar {
        height: var(--metrics-height);
        background: var(--bg-main);
        border-bottom: 1px solid var(--border-quiet);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
        overflow-x: auto;
      }

      .metric-item {
        display: flex;
        align-items: baseline;
        gap: 4px;
        font-size: 10px;
        color: var(--text-quiet);
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      .metric-value {
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--text-main);
        font-size: 11px;
      }

      /* Content Area */
      .content-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0 16px 40px;
      }

      .group-header {
        position: sticky;
        top: 0;
        background: var(--bg-main);
        padding: 8px 0 4px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-quiet);
        margin-bottom: 1px;
        z-index: 5;
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .group-count { font-weight: 400; color: var(--text-quiet); }

      .issue-list { display: flex; flex-direction: column; }

      .issue-row {
        display: grid;
        grid-template-columns: 18px 74px minmax(0, 1fr) 84px minmax(150px, auto) 100px;
        gap: 10px;
        align-items: center;
        padding: 3px 6px;
        border-bottom: 1px solid rgba(225, 225, 227, 0.4);
        cursor: pointer;
        transition: background 0.05s;
        min-height: 36px;
        font-size: 12px;
      }

      .issue-row:hover { background: var(--bg-hover); }

      .issue-status-icon {
        width: 14px; height: 14px;
        display: flex; align-items: center; justify-content: center;
      }

      .issue-id { font-family: var(--font-mono); font-size: 11px; color: var(--text-quiet); }

      .issue-content {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .issue-mainline {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .issue-detailline {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
      }

      .issue-title {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 34ch;
        flex-shrink: 1;
      }
      .issue-summary-sep { color: var(--text-quiet); padding: 0 2px; font-weight: 300; opacity: 0.6; }

      .issue-summary {
        color: var(--text-quiet);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        flex: 1;
      }

      .issue-board {
        font-size: 10px; color: var(--text-quiet); padding: 1px 4px;
        background: var(--bg-side); border-radius: var(--radius-sm);
        border: 1px solid var(--border-quiet);
      }

      .issue-meta {
        color: var(--text-quiet);
        display: flex; gap: 10px; align-items: center;
        min-width: 0;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .meta-item {
        white-space: nowrap;
      }

      .signal-chip {
        font-size: 10px;
        line-height: 1;
        color: var(--text-muted);
        background: var(--bg-side);
        border: 1px solid var(--border-quiet);
        border-radius: 999px;
        padding: 2px 5px;
        white-space: nowrap;
      }

      .signal-chip.accent {
        color: var(--accent);
        background: var(--accent-soft);
        border-color: rgba(0, 106, 220, 0.18);
      }

      /* Status Icons */
      .icon-circle { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid currentColor; }
      .icon-half {
        width: 12px; height: 12px; border-radius: 50%;
        border: 1.5px solid currentColor;
        background: linear-gradient(to right, currentColor 50%, transparent 50%);
      }
      .icon-full { width: 12px; height: 12px; border-radius: 50%; background: currentColor; }
      .icon-check {
        width: 12px; height: 12px; border-radius: 50%; background: currentColor;
        position: relative;
      }
      .icon-check::after {
        content: ""; position: absolute; left: 3px; top: 5px; width: 4.5px; height: 2.2px;
        border-left: 1.2px solid white; border-bottom: 1.2px solid white;
        transform: rotate(-45deg);
      }

      /* Priority Badges */
      .prio-p0 { color: #ef4444; font-weight: 700; }
      .prio-p1 { color: #f97316; }
      .prio-p2 { color: #3b82f6; }

      .empty-state { padding: 40px; text-align: center; color: var(--text-quiet); }

      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }

      @media (max-width: 980px) {
        .issue-row {
          grid-template-columns: 18px 66px minmax(0, 1fr) 80px;
          grid-template-areas:
            "icon id content date"
            ". . meta meta";
          row-gap: 3px;
          min-height: 42px;
        }

        .issue-row > :nth-child(1) { grid-area: icon; }
        .issue-row > :nth-child(2) { grid-area: id; }
        .issue-row > :nth-child(3) { grid-area: content; }
        .issue-row > :nth-child(4) { grid-area: board; display: none; }
        .issue-row > :nth-child(5) { grid-area: meta; justify-content: flex-start; }
        .issue-row > :nth-child(6) { grid-area: date; text-align: right; }
      }
    </style>
  </head>
  <body>
    <script id="agata-progress-data" type="application/json">__AGATA_PROGRESS_DATA__</script>

    <nav class="navbar">
      <div class="brand">
        <div class="project-name">__AGATA_PROJECT_NAME__</div>
        <div class="issue-id" id="project-root" style="opacity:0.6">/path/to/root</div>
      </div>
      <div class="main-menu">
        <div class="menu-item active" data-nav="current">现状 Current</div>
        <div class="menu-item" data-nav="history">历史 History</div>
      </div>
    </nav>

    <div class="toolbar">
      <div class="sub-tabs" id="sub-tabs">
        <!-- Rendered dynamically -->
      </div>
      <div class="search-container">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search issues..." />
      </div>
    </div>

    <div class="metrics-bar" id="metrics-bar">
      <!-- Injected by JS -->
    </div>

    <main class="content-scroll" id="content-scroll">
      <!-- Injected by JS -->
    </main>

    <footer style="height: 24px; border-top: 1px solid var(--border-quiet); background: var(--bg-side); display: flex; align-items: center; padding: 0 16px; font-size: 10px; color: var(--text-quiet); flex-shrink: 0;">
      Agata Workflow · <span id="generated-at" style="margin-left:4px;">__AGATA_GENERATED_AT__</span>
    </footer>

    <script>
      const data = JSON.parse(document.getElementById("agata-progress-data").textContent);
      let currentNav = 'current';
      let currentKind = 'all';
      let searchQuery = '';

      const STATE_CONFIG = {
        'tdo': { icon: 'icon-circle', color: 'var(--color-todo)' },
        'doi': { icon: 'icon-half', color: 'var(--color-active)' },
        'rvw': { icon: 'icon-half', style: 'opacity: 0.8; animation: pulse 2s infinite;', color: 'var(--color-review)' },
        'pss': { icon: 'icon-check', color: 'var(--color-pass)' },
        'dne': { icon: 'icon-check', color: 'var(--color-done)' },
        'bkd': { icon: 'icon-full', color: 'var(--color-blocked)' },
        'cand': { icon: 'icon-circle', style: 'opacity: 0.5', color: 'var(--color-cancelled)' },
        'arvd': { icon: 'icon-circle', style: 'opacity: 0.5', color: 'var(--color-cancelled)' },
      };

      function escapeHtml(value) {
        return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      function renderStatusIcon(state) {
        const config = STATE_CONFIG[state] || STATE_CONFIG['tdo'];
        return `<div class="issue-status-icon" style="color: ${config.color}; ${config.style || ''}"><div class="${config.icon}"></div></div>`;
      }

      function renderMetrics() {
        document.getElementById("project-root").textContent = data.project.root;
        let html = '';
        if (currentNav === 'current') {
          const m = data.current.metrics;
          html = `
            <div class="metric-item"><span>Tasks</span><span class="metric-value">${m.task_total}</span></div>
            <div class="metric-item"><span>Active</span><span class="metric-value" style="color: var(--accent)">${m.active_total}</span></div>
            <div class="metric-item"><span>Review</span><span class="metric-value" style="color: var(--color-review)">${m.review_total}</span></div>
            <div class="metric-item"><span>Done</span><span class="metric-value" style="color: var(--color-done)">${m.done_total}</span></div>
            <div class="metric-item"><span>Blocked</span><span class="metric-value" style="color: var(--color-blocked)">${m.blocked_total}</span></div>
            <div class="metric-item"><span>Docs</span><span class="metric-value">${m.non_task_total + m.review_doc_total}</span></div>
            <div class="metric-item"><span>Stale</span><span class="metric-value" style="${m.stale_coauthor_total ? 'color: var(--color-blocked)' : ''}">${m.stale_coauthor_total}</span></div>
            <div class="metric-item"><span>Progress</span><span class="metric-value">${Math.round(m.completion_ratio * 100)}%</span></div>
          `;
        } else {
          html = `
            <div class="metric-item"><span>Closed</span><span class="metric-value">${data.history.closed_tasks.length}</span></div>
            <div class="metric-item"><span>Events</span><span class="metric-value">${data.history.recent_events.length}</span></div>
            <div class="metric-item"><span>Archive</span><span class="metric-value">${data.history.archive_years.length}</span></div>
            <div class="metric-item"><span>Memory</span><span class="metric-value">${data.history.memory_file.anchors.length}</span></div>
            <div class="metric-item"><span>Generated</span><span class="metric-value">${escapeHtml(data.project.generated_display.slice(5, 16))}</span></div>
          `;
        }
        document.getElementById("metrics-bar").innerHTML = html;
      }

      function renderSubTabs() {
        let counts;
        let config;

        if (currentNav === 'current') {
          const fullItems = [...data.current.tasks, ...data.current.non_tasks];
          counts = {
            all: fullItems.length,
            tk: fullItems.filter(i => i.kind === 'tk').length,
            pl: fullItems.filter(i => i.kind === 'pl').length,
            rs: fullItems.filter(i => i.kind === 'rs').length,
            rf: fullItems.filter(i => i.kind === 'rf').length,
          };
          config = [
            { key: 'all', label: 'All' },
            { key: 'tk', label: 'Tasks' },
            { key: 'pl', label: 'Plans' },
            { key: 'rs', label: 'Research' },
            { key: 'rf', label: 'Refs' },
          ];
        } else {
          counts = {
            all: data.history.closed_tasks.length + data.history.recent_events.length + (data.history.memory_file.exists ? 1 : 0) + data.history.archive_years.length,
            tk: data.history.closed_tasks.length,
            evt: data.history.recent_events.length,
            mem: data.history.memory_file.exists ? 1 : 0,
            arc: data.history.archive_years.length,
          };
          config = [
            { key: 'all', label: 'All' },
            { key: 'tk', label: 'Closed' },
            { key: 'evt', label: 'Events' },
            { key: 'mem', label: 'Memory' },
            { key: 'arc', label: 'Archive' },
          ];
        }

        let html = '';
        config.forEach(item => {
          const activeClass = currentKind === item.key ? 'active' : '';
          html += `<button class="sub-tab ${activeClass}" onclick="setSubKind('${item.key}')">
            ${item.label} <span class="tab-badge">${counts[item.key]}</span>
          </button>`;
        });
        document.getElementById("sub-tabs").innerHTML = html;
      }

      function signalChips(items, accent = false) {
        if (!items || items.length === 0) return '';
        return items.map(item => `<span class="signal-chip ${accent ? 'accent' : ''}">${escapeHtml(item)}</span>`).join('');
      }

      function historyEventRow(event) {
        return {
          ...event,
          board: event.kind_label || 'history',
          priority: '',
          assignee: event.kind_label || '',
          relation: { derived_bits: [], linked_bits: [] },
          has_memory_anchor: false,
        };
      }

      function memorySummaryRows() {
        const file = data.history.memory_file;
        const rows = [];
        if (file.exists) {
          rows.push({
            doc_id: 'mem',
            title: 'project-memory-aaak',
            summary: `${file.anchors.length} anchors · ${file.path}`,
            board: 'memory',
            priority: '',
            assignee: 'project memory',
            modified_display: data.project.generated_display.slice(5, 16),
            file_url: file.file_url || '',
            state: 'dne',
            relation: {
              derived_bits: file.anchors.slice(0, 4),
              linked_bits: file.anchors.length > 4 ? [`+${file.anchors.length - 4}`] : [],
            },
            has_memory_anchor: false,
          });
        }
        return rows;
      }

      function archiveRows() {
        return data.history.archive_years.map(item => ({
          doc_id: `archive-${item.year}`,
          title: `archive ${item.year}`,
          summary: `${item.count} archived docs`,
          board: 'archive',
          priority: '',
          assignee: 'history',
          modified_display: '',
          file_url: '',
          state: 'arvd',
          relation: { derived_bits: [`docs ${item.count}`], linked_bits: [] },
          has_memory_anchor: false,
        }));
      }

      window.setSubKind = (kind) => {
        currentKind = kind;
        renderSubTabs();
        renderContent();
      };

      function renderIssueRow(issue) {
        const priorityClass = issue.priority ? `prio-${issue.priority}` : '';
        const relationBits = [
          ...(issue.relation?.derived_bits || []).slice(0, 3),
          ...(issue.relation?.linked_bits || []).slice(0, 2),
        ];
        const evidenceBits = [
          issue.verify ? 'verify' : '',
          issue.code_version ? 'code' : '',
          issue.memory && issue.memory !== 'none' ? `memory ${issue.memory}` : '',
          issue.has_memory_anchor ? 'anchored' : '',
        ].filter(Boolean);
        return `
          <div class="issue-row" data-url="${escapeHtml(issue.file_url || '')}" onclick="if (this.dataset.url) window.open(this.dataset.url, '_blank')">
            ${renderStatusIcon(issue.state)}
            <div class="issue-id">${escapeHtml(issue.doc_id)}</div>
            <div class="issue-content">
              <div class="issue-mainline">
                <div class="issue-title">${escapeHtml(issue.title)}</div>
                ${issue.summary ? `<span class="issue-summary-sep">·</span><div class="issue-summary">${escapeHtml(issue.summary)}</div>` : ''}
              </div>
              <div class="issue-detailline">
                ${signalChips(relationBits)}
                ${signalChips(evidenceBits, true)}
              </div>
            </div>
            <div class="issue-board">${escapeHtml(issue.board || '—')}</div>
            <div class="issue-meta">
              <span class="${priorityClass}">${escapeHtml(issue.priority || '—')}</span>
              <span class="meta-item">${escapeHtml(issue.assignee || issue.owner || '—')}</span>
              ${issue.path ? `<span class="meta-item">${escapeHtml(issue.path)}</span>` : ''}
            </div>
            <div class="issue-id" style="text-align: right;">${escapeHtml(issue.modified_display)}</div>
          </div>
        `;
      }

      function renderContent() {
        const container = document.getElementById("content-scroll");
        const matchesQuery = (item) => {
          if (!searchQuery) return true;
          const q = searchQuery.toLowerCase();
          return (
            item.title.toLowerCase().includes(q) ||
            item.doc_id.toLowerCase().includes(q) ||
            (item.summary && item.summary.toLowerCase().includes(q)) ||
            (item.board && item.board.toLowerCase().includes(q)) ||
            (item.path && item.path.toLowerCase().includes(q)) ||
            ((item.assignee || item.owner) && String(item.assignee || item.owner).toLowerCase().includes(q))
          );
        };

        const renderStateGroups = (items) => {
          if (items.length === 0) return '';
          const groups = {};
          const stateOrder = ['doi', 'rvw', 'bkd', 'tdo', 'pss', 'dne', 'cand', 'arvd'];

          items.forEach(item => {
            const s = item.state;
            if (!groups[s]) groups[s] = [];
            groups[s].push(item);
          });

          let html = '';
          stateOrder.forEach(state => {
            if (groups[state] && groups[state].length > 0) {
              const label = data.current.state_counts.find(c => c.state === state)?.label || state;
              html += `
                <div class="group-header">
                  ${label} <span class="group-count">${groups[state].length}</span>
                </div>
                <div class="issue-list">
                  ${groups[state].map(item => renderIssueRow(item)).join('')}
                </div>
              `;
            }
          });
          return html;
        };

        let html = '';

        if (currentNav === 'current') {
          let items = [...data.current.tasks, ...data.current.non_tasks];

          if (currentKind !== 'all') {
            items = items.filter(i => i.kind === currentKind);
          }

          items = items.filter(matchesQuery);
          html = renderStateGroups(items);
        } else {
          const closedTasks = data.history.closed_tasks.filter(matchesQuery);
          const events = data.history.recent_events.map(historyEventRow).filter(matchesQuery);
          const memories = memorySummaryRows().filter(matchesQuery);
          const archives = archiveRows().filter(matchesQuery);

          if (currentKind === 'tk') {
            html = renderStateGroups(closedTasks);
          } else if (currentKind === 'evt') {
            html = `
              <div class="group-header">Recent Activity <span class="group-count">${events.length}</span></div>
              <div class="issue-list">${events.map(renderIssueRow).join('')}</div>
            `;
          } else if (currentKind === 'mem') {
            html = `
              <div class="group-header">Project Memory <span class="group-count">${memories.length}</span></div>
              <div class="issue-list">${memories.map(renderIssueRow).join('')}</div>
            `;
          } else if (currentKind === 'arc') {
            html = `
              <div class="group-header">Archive Years <span class="group-count">${archives.length}</span></div>
              <div class="issue-list">${archives.map(renderIssueRow).join('')}</div>
            `;
          } else {
            html += `
              <div class="group-header">Recent Activity <span class="group-count">${events.length}</span></div>
              <div class="issue-list">${events.map(renderIssueRow).join('')}</div>
            `;
            html += renderStateGroups(closedTasks);
            html += `
              <div class="group-header">Project Memory <span class="group-count">${memories.length}</span></div>
              <div class="issue-list">${memories.map(renderIssueRow).join('')}</div>
            `;
            html += `
              <div class="group-header">Archive Years <span class="group-count">${archives.length}</span></div>
              <div class="issue-list">${archives.map(renderIssueRow).join('')}</div>
            `;
          }
        }

        if (!html.trim()) {
          container.innerHTML = '<div class="empty-state">No items found matching your filter.</div>';
          return;
        }

        container.innerHTML = html;
      }

      // Interactivity
      document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentNav = item.dataset.nav;
          currentKind = 'all';
          renderMetrics();
          renderSubTabs();
          renderContent();
        });
      });

      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderContent();
      });

      // Init
      renderMetrics();
      renderSubTabs();
      renderContent();
    </script>
  </body>
</html>
